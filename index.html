<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Classifier</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Ticket Classification System</h1>
        
        <div class="input-section">
            <textarea id="ticketInput" placeholder="Enter ticket description..." rows="4"></textarea>
            <button id="submitBtn">Submit Ticket</button>
        </div>

        <div class="tickets-section">
            <h2>Tickets</h2>
            <div id="ticketsList"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
