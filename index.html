<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Classifier</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <div class="header-content">
                <div>
                    <h1>🎫 Ticket Classification System</h1>
                    <p class="subtitle">AI-powered ticket management and classification</p>
                </div>
                <div class="user-menu">
                    <img id="userPhoto" class="user-photo" alt="User" style="display: none;">
                    <span id="userName" class="user-name"></span>
                    <button id="logoutBtn" class="logout-btn">Logout</button>
                </div>
            </div>
        </header>
        
        <div class="input-section">
            <h2>Create New Ticket</h2>
            <textarea id="ticketInput" placeholder="Describe your ticket here..." rows="4"></textarea>
            <div class="button-group">
                <button id="voiceBtn" title="Click to start/stop recording">🎤 Voice Input</button>
                <button id="submitBtn" class="primary">Submit Ticket</button>
            </div>
        </div>

        <div class="tickets-section">
            <div class="section-header">
                <h2>All Tickets</h2>
                <span id="ticketCount" class="ticket-count">0 tickets</span>
            </div>
            <div class="controls">
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="bug">Bug</button>
                    <button class="filter-btn" data-filter="task">Task</button>
                    <button class="filter-btn" data-filter="enhancement">Enhancement</button>
                    <button class="filter-btn" data-filter="research">Research</button>
                    <button class="filter-btn" data-filter="design">Design</button>
                    <button class="filter-btn" data-filter="testing">Testing</button>
                    <button class="filter-btn" data-filter="deployment">Deployment</button>
                    <button class="filter-btn" data-filter="documentation">Docs</button>
                </div>
                <select id="sortSelect">
                    <option value="newest">Newest first</option>
                    <option value="oldest">Oldest first</option>
                    <option value="type">By type</option>
                </select>
            </div>
            <div id="ticketsList" class="cards-grid"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
